<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обратная связь</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       ⚙️  ЦВЕТА — меняй здесь под свой ресторан
    ═══════════════════════════════════════════ */
    :root {
      --gold:        #C9A96E;
      --gold-light:  #E8D5B0;
      --dark:        #1A1209;
      --dark-card:   #221A0E;
      --text:        #F5EDD8;
      --text-muted:  #9A8A6A;
      --border:      rgba(201,169,110,0.25);
    }

    /* ═══════════════════════════════════════════
       📸  ФОТО — замени ссылку на своё фото
           (загрузи фото в папку public/ и напиши: url('your-photo.jpg'))
    ═══════════════════════════════════════════ */
    .hero-bg {
      background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200&q=80');
      /* ЗАМЕНИ на: background-image: url('restaurant.jpg'); */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Шапка с фото ── */
    .hero {
      position: relative;
      height: 240px;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.45);
    }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, var(--dark) 100%);
    }

    .hero-content {
      position: relative; z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 28px;
      gap: 6px;
    }

    /* ── Логотип ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .logo-icon {
      width: 52px; height: 52px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: rgba(26,18,9,0.7);
      /* 📸 Замени эмодзи на тег <img> с логотипом если хочешь */
    }

    /* ═══════════════════════════════════════════
       ✏️  НАЗВАНИЕ — замени на имя своего ресторана
    ═══════════════════════════════════════════ */
    .logo-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .logo-tagline {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* ── Основной контейнер ── */
    .container {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Плашка стола ── */
    .table-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(201,169,110,0.12);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin: 24px auto 0;
      display: flex;
      width: fit-content;
    }

    /* ── Кнопка официанта ── */
    .waiter-btn {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      background: rgba(201,169,110,0.1);
      border: 1.5px solid var(--gold);
      border-radius: 14px;
      color: var(--gold);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .waiter-btn:hover, .waiter-btn:active {
      background: var(--gold);
      color: var(--dark);
      transform: translateY(-1px);
    }

    .waiter-btn:active { transform: scale(0.98); }

    /* ── Разделитель ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0 18px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Карточка формы ── */
    .card {
      background: var(--dark-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 18px;
    }

    /* ── Выбор типа ── */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .type-btn {
      padding: 12px 6px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid transparent;
      border-radius: 12px;
      color: var(--text-muted);
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .type-btn .emoji { font-size: 20px; }

    .type-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,169,110,0.1);
    }

    /* ── Текстполе ── */
    .textarea-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      padding: 14px 16px;
      resize: none;
      height: 110px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }

    textarea:focus { border-color: var(--gold); }
    textarea::placeholder { color: var(--text-muted); }

    /* ── Кнопка отправки ── */
    .send-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold), #A07840);
      border: none;
      border-radius: 14px;
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }

    .send-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .send-btn:active { transform: scale(0.98); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Успех ── */
    .success-msg {
      display: none;
      text-align: center;
      padding: 28px 20px;
    }

    .success-msg.show { display: block; }
    .card.hide { display: none; }

    .success-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .success-back {
      margin-top: 20px;
      display: inline-block;
      font-size: 13px;
      color: var(--gold);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* ── Toast уведомление ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gold);
      color: var(--dark);
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Нижняя ссылка ── */
    .footer-link {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      color: rgba(154,138,106,0.4);
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container > * {
      animation: fadeIn 0.5s ease both;
    }

    .container > *:nth-child(1) { animation-delay: 0.05s; }
    .container > *:nth-child(2) { animation-delay: 0.12s; }
    .container > *:nth-child(3) { animation-delay: 0.18s; }
    .container > *:nth-child(4) { animation-delay: 0.24s; }
    .container > *:nth-child(5) { animation-delay: 0.30s; }
  </style>
</head>
<body>

<!-- ── Шапка ── -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="logo-wrap">
      <div class="logo-icon">🍽</div>
      <!-- ✏️ Замени НАЗВАНИЕ РЕСТОРАНА ниже -->
      <div class="logo-name">НАЗВАНИЕ</div>
      <div class="logo-tagline">Ваш отзыв важен для нас</div>
    </div>
  </div>
</div>

<div class="container">

  <!-- Номер стола -->
  <div class="table-badge" id="tableBadge">
    🪑 Стол <span id="tableNum">—</span>
  </div>

  <!-- Кнопка официанта -->
  <button class="waiter-btn" onclick="callWaiter()">
    🔔 Позвать официанта
  </button>

  <div class="divider"><span>или оставьте отзыв</span></div>

  <!-- Форма -->
  <div class="card" id="formCard">
    <div class="card-title">Ваш отзыв</div>

    <div class="type-grid">
      <button class="type-btn active" onclick="selectType(this, 'Жалоба')">
        <span class="emoji">🚨</span>Жалоба
      </button>
      <button class="type-btn" onclick="selectType(this, 'Предложение')">
        <span class="emoji">💡</span>Предложение
      </button>
      <button class="type-btn" onclick="selectType(this, 'Благодарность')">
        <span class="emoji">🙏</span>Благодарность
      </button>
    </div>

    <div class="textarea-wrap">
      <textarea id="message" placeholder="Напишите ваше сообщение..."></textarea>
    </div>

    <button class="send-btn" id="sendBtn" onclick="send()">Отправить</button>
  </div>

  <!-- Успех -->
  <div class="success-msg" id="successMsg">
    <div class="success-icon">✨</div>
    <div class="success-title">Спасибо!</div>
    <div class="success-sub">Ваш отзыв получен.<br>Мы ценим ваше мнение и обязательно его учтём.</div>
    <span class="success-back" onclick="resetForm()">← Отправить ещё</span>
  </div>

  <div class="footer-link">feedback system</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let selectedType = "Жалоба";

  function getTable() {
    return new URLSearchParams(window.location.search).get("table");
  }

  // Показать номер стола
  const table = getTable();
  document.getElementById("tableNum").textContent = table || "—";

  function selectType(btn, type) {
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedType = type;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }

  async function send() {
    const message = document.getElementById("message").value.trim();
    const btn = document.getElementById("sendBtn");

    btn.disabled = true;
    btn.textContent = "Отправка...";

    try {
      await fetch("/api/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ table, type: selectedType, message })
      });

      document.getElementById("formCard").classList.add("hide");
      document.getElementById("successMsg").classList.add("show");
    } catch {
      showToast("Ошибка соединения. Попробуйте ещё раз.");
      btn.disabled = false;
      btn.textContent = "Отправить";
    }
  }

  async function callWaiter() {
    try {
      await fetch("/api/waiter", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ table })
      });
      showToast("🔔 Официант уже идёт к вам!");
    } catch {
      showToast("Ошибка соединения");
    }
  }

  function resetForm() {
    document.getElementById("message").value = "";
    document.getElementById("formCard").classList.remove("hide");
    document.getElementById("successMsg").classList.remove("show");
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("sendBtn").textContent = "Отправить";
    selectedType = "Жалоба";
    document.querySelectorAll(".type-btn").forEach((b, i) => {
      b.classList.toggle("active", i === 0);
    });
  }
</script>
</body>
</html>
