<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:       #C9A96E;
      --gold-light: #E8D5B0;
      --dark:       #0F0D08;
      --card:       #1A1510;
      --card2:      #211C13;
      --text:       #F0E8D5;
      --muted:      #7A6A4A;
      --border:     rgba(201,169,110,0.2);
      --red:        #E05050;
      --green:      #5CB87A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Логин ── */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-icon { font-size: 36px; margin-bottom: 12px; }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .login-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .login-input:focus { border-color: var(--gold); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), #A07840);
      border: none;
      border-radius: 12px;
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.88; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; }

    /* ── Дашборд ── */
    #dashboard { display: none; }

    .top-bar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .top-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-brand .icon { font-size: 22px; }

    .top-brand .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .top-brand .sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    .top-actions { display: flex; gap: 10px; align-items: center; }

    .btn-sm {
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: all 0.2s;
    }

    .btn-sm:hover { border-color: var(--gold); color: var(--gold); }

    .btn-sm.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── Статы ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 20px 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ── Фильтры ── */
    .filters {
      padding: 0 24px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 40px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,169,110,0.1);
    }

    /* ── Список ── */
    .entries { padding: 0 24px 40px; display: flex; flex-direction: column; gap: 10px; }

    .entry {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: border-color 0.2s;
      animation: fadeIn 0.3s ease both;
    }

    .entry.unread { border-left: 3px solid var(--gold); }
    .entry.read { opacity: 0.6; }

    .entry-emoji { font-size: 24px; flex-shrink: 0; margin-top: 2px; }

    .entry-body { flex: 1; min-width: 0; }

    .entry-head {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }

    .entry-type {
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
    }

    .entry-table {
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 2px 10px;
    }

    .entry-time {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    .entry-msg {
      font-size: 14px;
      color: var(--text);
      font-weight: 300;
      line-height: 1.55;
    }

    .entry-msg.empty { color: var(--muted); font-style: italic; }

    .entry-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .act-btn {
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Jost', sans-serif;
      transition: all 0.2s;
    }

    .act-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
    .act-btn.del:hover { color: var(--red); border-color: var(--red); }

    /* ── Пусто ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Новое уведомление ── */
    .new-badge {
      display: inline-block;
      background: var(--gold);
      color: var(--dark);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .top-bar, .stats-row, .filters, .entries { padding-left: 16px; padding-right: 16px; }
      .entry-time { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Логин ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">Админ-панель</div>
    <div class="login-sub">Введите пароль для входа</div>
    <input class="login-input" type="password" id="pwInput" placeholder="Пароль"
           onkeydown="if(event.key==='Enter') login()">
    <button class="login-btn" onclick="login()">Войти</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- ── Дашборд ── -->
<div id="dashboard">

  <div class="top-bar">
    <div class="top-brand">
      <span class="icon">🍽</span>
      <div>
        <div class="name">НАЗВАНИЕ</div><!-- ✏️ Замени -->
        <div class="sub">Админ-панель</div>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn-sm" onclick="loadData()">🔄 Обновить</button>
      <button class="btn-sm danger" onclick="logout()">Выйти</button>
    </div>
  </div>

  <!-- Статы -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Фильтры -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
    <button class="filter-btn" onclick="setFilter('Жалоба', this)">🚨 Жалобы</button>
    <button class="filter-btn" onclick="setFilter('Предложение', this)">💡 Предложения</button>
    <button class="filter-btn" onclick="setFilter('Благодарность', this)">🙏 Благодарности</button>
    <button class="filter-btn" onclick="setFilter('Позвать официанта', this)">🔔 Официант</button>
    <button class="filter-btn" onclick="setFilter('unread', this)">🔵 Непрочитанные</button>
  </div>

  <div class="entries" id="entriesList"></div>
</div>

<script>
  let password = "";
  let allData = [];
  let currentFilter = "all";

  const TYPE_EMOJI = {
    "Жалоба": "🚨",
    "Предложение": "💡",
    "Благодарность": "🙏",
    "Позвать официанта": "🔔"
  };

  function login() {
    const pw = document.getElementById("pwInput").value;
    fetch(`/api/all?password=${encodeURIComponent(pw)}`)
      .then(r => {
        if (!r.ok) throw new Error();
        return r.json();
      })
      .then(data => {
        password = pw;
        document.getElementById("loginWrap").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        allData = data;
        renderAll();
        // Автообновление каждые 30 сек
        setInterval(loadData, 30000);
      })
      .catch(() => {
        document.getElementById("loginErr").textContent = "Неверный пароль";
      });
  }

  function logout() {
    password = "";
    location.reload();
  }

  function loadData() {
    fetch(`/api/all?password=${encodeURIComponent(password)}`)
      .then(r => r.json())
      .then(data => {
        allData = data;
        renderAll();
      });
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderEntries();
  }

  function renderAll() {
    renderStats();
    renderEntries();
  }

  function renderStats() {
    const total = allData.length;
    const unread = allData.filter(e => !e.read).length;
    const complaints = allData.filter(e => e.type === "Жалоба").length;
    const thanks = allData.filter(e => e.type === "Благодарность").length;

    document.getElementById("statsRow").innerHTML = `
      <div class="stat-card">
        <div class="stat-num">${total}</div>
        <div class="stat-label">Всего</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#E8D5B0">${unread}</div>
        <div class="stat-label">Непрочитанных</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#E05050">${complaints}</div>
        <div class="stat-label">Жалоб</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#5CB87A">${thanks}</div>
        <div class="stat-label">Благодарностей</div>
      </div>
    `;
  }

  function renderEntries() {
    let filtered = allData;
    if (currentFilter === "unread") filtered = allData.filter(e => !e.read);
    else if (currentFilter !== "all") filtered = allData.filter(e => e.type === currentFilter);

    const el = document.getElementById("entriesList");

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Нет записей</p></div>`;
      return;
    }

    el.innerHTML = filtered.map(e => {
      const emoji = TYPE_EMOJI[e.type] || "📩";
      const date = new Date(e.time);
      const timeStr = date.toLocaleDateString("ru-RU") + " " + date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
      const hasMsg = e.message && e.message.trim();

      return `
        <div class="entry ${e.read ? 'read' : 'unread'}" id="entry-${e.id}">
          <div class="entry-emoji">${emoji}</div>
          <div class="entry-body">
            <div class="entry-head">
              <span class="entry-type">${e.type}</span>
              <span class="entry-table">Стол ${e.table}</span>
              ${!e.read ? '<span class="new-badge">НОВОЕ</span>' : ''}
              <span class="entry-time">${timeStr}</span>
            </div>
            <div class="entry-msg ${hasMsg ? '' : 'empty'}">${hasMsg ? escHtml(e.message) : 'Без сообщения'}</div>
            <div class="entry-actions">
              ${!e.read ? `<button class="act-btn" onclick="markRead(${e.id})">✓ Прочитано</button>` : ''}
              <button class="act-btn del" onclick="deleteEntry(${e.id})">🗑 Удалить</button>
            </div>
          </div>
        </div>
      `;
    }).join("");
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function markRead(id) {
    fetch(`/api/read/${id}?password=${encodeURIComponent(password)}`, { method: "POST" })
      .then(() => {
        const entry = allData.find(e => e.id === id);
        if (entry) entry.read = true;
        renderAll();
      });
  }

  function deleteEntry(id) {
    if (!confirm("Удалить запись?")) return;
    fetch(`/api/delete/${id}?password=${encodeURIComponent(password)}`, { method: "DELETE" })
      .then(() => {
        allData = allData.filter(e => e.id !== id);
        renderAll();
      });
  }
</script>
</body>
</html>
